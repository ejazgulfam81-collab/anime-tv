<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solo Leveling TV</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    font-size:24px;
}

video{
    width:100%;
    height:65vh;
    background:black;
}

.episode{
    margin:15px;
    padding:15px;
    background:#222;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
}

.episode:hover{
    background:#333;
}

</style>

</head>
<body>

<header>
Solo Leveling Hindi
</header>

<video
id="player"
controls
autoplay
playsinline
webkit-playsinline
>

<source
src="https://hugh.cdn.rumble.cloud/video/fww1/b9/s8/2/6/L/n/w/6Lnwy.caa.mp4?u=0&b=0"
type="video/mp4"
>

</video>

<div
class="episode"
onclick="playEpisode1()"
>
Episode 1 Hindi
</div>

<script>

function playEpisode1(){

var player =
document.getElementById("player");

player.src =
"https://hugh.cdn.rumble.cloud/video/fww1/b9/s8/2/6/L/n/w/6Lnwy.caa.mp4?u=0&b=0";

player.play();

}

</script>

</body>
</html>
