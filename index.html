<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime TV</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:28px;
    position:sticky;
    top:0;
    z-index:100;
}

video,
iframe{
    width:100%;
    height:45vh;
    background:black;
    border:none;
}

.sections{
    padding:12px;
}

.sectionTitle{
    font-size:24px;
    margin-top:20px;
    margin-bottom:15px;
    color:#ff3c3c;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.card,
.episode{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.episode{
    padding:15px;
    text-align:center;
    font-size:18px;
}

.thumb{
    width:100%;
    display:block;
}

.title{
    padding:8px;
    font-size:14px;
}

.searchBox{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}

.searchBox input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.searchBox button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

<header>
Anime TV
</header>

<!-- PLAYER -->

<video
id="player"
controls
autoplay
playsinline
webkit-playsinline
>

<source
src="https://hugh.cdn.rumble.cloud/video/fww1/b9/s8/2/6/L/n/w/6Lnwy.caa.mp4?u=0&b=0"
type="video/mp4">

</video>

<div class="sections">

<!-- SOLO LEVELING -->

<div class="sectionTitle">
Solo Leveling Hindi Season 1
</div>

<div class="grid">

<div class="episode" onclick="playEpisode(1)">EP 1</div>
<div class="episode" onclick="playEpisode(2)">EP 2</div>
<div class="episode" onclick="playEpisode(3)">EP 3</div>
<div class="episode" onclick="playEpisode(4)">EP 4</div>
<div class="episode" onclick="playEpisode(5)">EP 5</div>
<div class="episode" onclick="playEpisode(6)">EP 6</div>
<div class="episode" onclick="playEpisode(7)">EP 7</div>
<div class="episode" onclick="playEpisode(8)">EP 8</div>
<div class="episode" onclick="playEpisode(9)">EP 9</div>
<div class="episode" onclick="playEpisode(10)">EP 10</div>
<div class="episode" onclick="playEpisode(11)">EP 11</div>
<div class="episode" onclick="playEpisode(12)">EP 12</div>

</div>

<!-- YOUTUBE SEARCH -->

<div class="sectionTitle">
YouTube Search
</div>

<div class="searchBox">

<input
id="searchInput"
placeholder="Search YouTube">

<button onclick="searchYT()">
Search
</button>

</div>

<div id="ytResults" class="grid"></div>

</div>

<script>

/* =========================
   YOUTUBE API KEY
========================= */

const API_KEY =
"AIzaSyANjjevbpy7wcZ-WZ06Vn_T1WyqD9TcngY";

/* =========================
   SOLO LEVELING LINKS
========================= */

const episodes = {

1:"https://hugh.cdn.rumble.cloud/video/fww1/b9/s8/2/6/L/n/w/6Lnwy.caa.mp4?u=0&b=0",

2:"https://hugh.cdn.rumble.cloud/video/fww1/63/s8/2/G/R/n/w/GRnwy.caa.mp4?u=0&b=0",

3:"https://hugh.cdn.rumble.cloud/video/fww1/7e/s8/2/s/U/n/w/sUnwy.caa.mp4?u=0&b=0",

4:"https://hugh.cdn.rumble.cloud/video/fww1/af/s8/2/Y/Z/n/w/YZnwy.caa.mp4?u=0&b=0",

5:"https://hugh.cdn.rumble.cloud/video/fww1/40/s8/2/g/5/n/w/g5nwy.caa.mp4?u=0&b=0",

6:"https://hugh.cdn.rumble.cloud/video/fww1/1d/s8/2/-/d/o/w/-dowy.caa.mp4?u=0&b=0",

7:"https://hugh.cdn.rumble.cloud/video/fww1/2b/s8/2/c/h/o/w/chowy.caa.mp4?u=0&b=0",

8:"https://hugh.cdn.rumble.cloud/video/fww1/61/s8/2/g/m/o/w/gmowy.caa.mp4?u=0&b=0",

9:"https://hugh.cdn.rumble.cloud/video/fww1/8a/s8/2/4/q/o/w/4qowy.caa.mp4?u=0&b=0",

10:"https://hugh.cdn.rumble.cloud/video/fww1/89/s8/2/e/z/o/w/ezowy.caa.mp4?u=0&b=0",

11:"https://hugh.cdn.rumble.cloud/video/fww1/e7/s8/2/4/C/o/w/4Cowy.caa.mp4?u=0&b=0",

12:"https://hugh.cdn.rumble.cloud/video/fww1/32/s8/2/0/L/o/w/0Lowy.caa.mp4?u=0&b=0"

};

/* =========================
   PLAY ANIME
========================= */

function playEpisode(ep){

removeYT();

let player =
document.getElementById("player");

player.style.display = "block";

player.src = episodes[ep];

player.play();

window.scrollTo(0,0);

}

/* =========================
   LIGHT YOUTUBE SEARCH
========================= */

async function searchYT(){

let query =
document.getElementById("searchInput").value;

let results =
document.getElementById("ytResults");

results.innerHTML =
"Loading...";

try{

let response =
await fetch(

"https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=4&q="

+ encodeURIComponent(query)

+ "&key="

+ API_KEY

);

let data =
await response.json();

results.innerHTML = "";

if(!data.items){

results.innerHTML =
"Search Failed";

return;

}

for(let i=0;i<data.items.length;i++){

let video =
data.items[i];

let id =
video.id.videoId;

let title =
video.snippet.title;

let thumb =
video.snippet.thumbnails.default.url;

let div =
document.createElement("div");

div.className =
"card";

div.innerHTML =

'<img class="thumb" src="' +
thumb +
'">' +

'<div class="title">' +
title +
'</div>';

div.onclick = function(){

playYT(id);

};

results.appendChild(div);

}

}catch(e){

results.innerHTML =
"Internet/API Error";

}

}

/* =========================
   PLAY YOUTUBE
========================= */

function playYT(videoId){

let player =
document.getElementById("player");

player.pause();

player.style.display =
"none";

removeYT();

let iframe =
document.createElement("iframe");

iframe.id =
"ytFrame";

iframe.src =

"https://www.youtube.com/embed/" +

videoId +

"?autoplay=1";

iframe.allowFullscreen =
true;

iframe.allow =
"autoplay; encrypted-media";

document.body.insertBefore(

iframe,

document.querySelector(".sections")

);

window.scrollTo(0,0);

}

/* =========================
   REMOVE OLD IFRAME
========================= */

function removeYT(){

let old =
document.getElementById("ytFrame");

if(old){

old.remove();

}

}

</script>

</body>
</html>
